<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Find Radhika 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: #fdf6ee;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    font-family: 'Caveat', cursive;
    overflow: hidden;
    touch-action: none;
  }

  header { text-align: center; }
  header h1 { font-size: 1.6rem; color: #d9536f; font-weight: 700; }
  header p  { font-size: 1rem; color: #c4a0a8; margin-top: 3px; }

  #maze-wrap {
    border-radius: 18px;
    overflow: hidden;
    border: 2.5px solid #f2c4cf;
    box-shadow: 0 6px 28px #f2c4cf28;
  }
  canvas { display: block; }

  /* swipe hint */
  #hint {
    font-size: 0.95rem;
    color: #d4adb6;
    letter-spacing: 0.2px;
  }

  /* WIN */
  #win {
    display: none;
    position: fixed; inset: 0;
    background: rgba(253,246,238,0.96);
    backdrop-filter: blur(10px);
    align-items: center; justify-content: center;
    z-index: 99;
  }
  #win.show { display: flex; }
  #win-card {
    background: #fff;
    border-radius: 28px;
    padding: 44px 36px;
    text-align: center;
    border: 2.5px solid #f2c4cf;
    box-shadow: 0 16px 48px #f2c4cf40;
    animation: pop .4s cubic-bezier(.34,1.56,.64,1);
    width: 82vw; max-width: 320px;
  }
  @keyframes pop { from{transform:scale(.55);opacity:0} to{transform:scale(1);opacity:1} }

  #win-emojis { font-size: 3.8rem; margin-bottom: 16px; animation: hug 1s ease-in-out infinite; }
  @keyframes hug { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

  #win-msg { font-size: 1.85rem; color: #d9536f; line-height: 1.5; }

  #again {
    margin-top: 24px;
    background: #d9536f; color: #fff;
    border: none; border-radius: 50px;
    padding: 12px 36px;
    font-family: 'Caveat', cursive; font-size: 1.2rem; font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <h1>Find Radhika 💛</h1>
  <p>swipe anywhere to move</p>
</header>

<div id="maze-wrap"><canvas id="c"></canvas></div>

<div id="hint">👆 swipe to guide the boy to the girl</div>

<div id="win">
  <div id="win-card">
    <div id="win-emojis">👦🌸👧</div>
    <div id="win-msg">Great!<br>You've got your<br>Radhikaa 💛🥺</div>
    <button id="again" onclick="init()">Play again 🔄</button>
  </div>
</div>

<script>
// size to fill phone screen nicely
const COLS = 7, ROWS = 9;
const maxW = Math.min(window.innerWidth  * 0.9, 360);
const maxH = (window.innerHeight - 180) * 0.85; // leave room for header + hint
const CELL = Math.floor(Math.min(maxW / COLS, maxH / ROWS, 48));
const W = COLS * CELL, H = ROWS * CELL;

const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

const END = { x: COLS-1, y: ROWS-1 };
let grid, vis, px, py;

const idx = (x, y) => y * COLS + x;

function shuffle(a) {
  for (let n = a.length-1; n > 0; n--) {
    const j = 0 | Math.random() * (n+1);
    [a[n], a[j]] = [a[j], a[n]];
  }
  return a;
}

function carve(x, y) {
  vis[idx(x,y)] = true;
  for (const [dx,dy] of shuffle([[1,0],[-1,0],[0,1],[0,-1]])) {
    const nx = x+dx, ny = y+dy;
    if (nx<0||nx>=COLS||ny<0||ny>=ROWS||vis[idx(nx,ny)]) continue;
    if (dx ===  1) grid[idx(x,y)].r  = false;
    if (dx === -1) grid[idx(nx,ny)].r = false;
    if (dy ===  1) grid[idx(x,y)].b  = false;
    if (dy === -1) grid[idx(nx,ny)].b = false;
    carve(nx, ny);
  }
}

function init() {
  document.getElementById('win').classList.remove('show');
  grid = Array.from({length: COLS*ROWS}, () => ({r:true, b:true}));
  vis  = new Array(COLS*ROWS).fill(false);
  carve(0, 0);
  px = 0; py = 0;
  draw();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // background
  ctx.fillStyle = '#fffaf5';
  ctx.fillRect(0, 0, W, H);

  // end cell glow
  ctx.fillStyle = '#fde8ef';
  ctx.beginPath();
  ctx.roundRect(END.x*CELL+2, END.y*CELL+2, CELL-4, CELL-4, 8);
  ctx.fill();

  // walls
  ctx.strokeStyle = '#f0bfc9';
  ctx.lineWidth = 2;
  ctx.lineCap = 'square';

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const c = grid[idx(x,y)];
      const x0 = x*CELL, y0 = y*CELL;
      if (c.r && x < COLS-1) {
        ctx.beginPath(); ctx.moveTo(x0+CELL, y0); ctx.lineTo(x0+CELL, y0+CELL); ctx.stroke();
      }
      if (c.b && y < ROWS-1) {
        ctx.beginPath(); ctx.moveTo(x0, y0+CELL); ctx.lineTo(x0+CELL, y0+CELL); ctx.stroke();
      }
    }
  }

  // outer border
  ctx.strokeStyle = '#e8a0b0';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(1, 1, W-2, H-2);

  // emojis
  const fs = Math.round(CELL * 0.64);
  ctx.font = `${fs}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillText('👧', END.x*CELL + CELL/2, END.y*CELL + CELL/2);
  ctx.fillText('👦', px*CELL + CELL/2,    py*CELL + CELL/2);
}

function mv(dx, dy) {
  const nx = px+dx, ny = py+dy;
  if (nx<0||nx>=COLS||ny<0||ny>=ROWS) return;
  let ok = false;
  if (dx ===  1 && !grid[idx(px,py)].r)  ok = true;
  if (dx === -1 && !grid[idx(nx,ny)].r)  ok = true;
  if (dy ===  1 && !grid[idx(px,py)].b)  ok = true;
  if (dy === -1 && !grid[idx(nx,ny)].b)  ok = true;
  if (!ok) return;
  px = nx; py = ny;
  draw();
  if (px === END.x && py === END.y)
    setTimeout(() => document.getElementById('win').classList.add('show'), 220);
}

// ── touch: swipe anywhere on screen ──────────────────
let tx = 0, ty = 0, moved = false;

document.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
  moved = false;
}, { passive: false });

document.addEventListener('touchmove', e => {
  e.preventDefault(); // block scroll
  if (moved) return;
  const dx = e.touches[0].clientX - tx;
  const dy = e.touches[0].clientY - ty;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  moved = true;
  if (Math.abs(dx) > Math.abs(dy)) mv(dx > 0 ? 1 : -1, 0);
  else                               mv(0, dy > 0 ? 1 : -1);
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, { passive: false });

// keyboard fallback
document.addEventListener('keydown', e => {
  const m = {ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  if (m[e.key]) { e.preventDefault(); mv(...m[e.key]); }
});

init();
</script>
</body>
</html>
